<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2f855a"></stop>
      <stop offset="100%" stop-color="#1e3a8a"></stop>
    </linearGradient>
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="2" fill="rgba(255,255,255,0.08)"></circle>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"></rect>
  <rect width="1600" height="900" fill="url(#dots)"></rect>

  <g opacity="0.15">
    <circle cx="300" cy="200" r="180" fill="#fff"></circle>
    <circle cx="1300" cy="700" r="220" fill="#fff"></circle>
  </g>
</svg>
